appId: com.pinchclip.app
productName: PinchClip
files:
  - dist/**/*
  - package.json
directories:
  output: release
mac:
  target:
    - dmg
  category: public.app-category.productivity
win:
  icon: build/icon.ico
  artifactName: ${productName}-${version}-${arch}.${ext}
  target:
    - nsis
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: PinchClip
